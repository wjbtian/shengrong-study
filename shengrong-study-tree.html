<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>🌌 尚融知识宇宙 - 知识树</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Ma+Shan+Zheng&family=Noto+Sans+SC:wght@300;400;500;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg-deep: #050510;
      --bg-card: rgba(255,255,255,0.04);
      --bg-card-hover: rgba(255,255,255,0.08);
      --text: #e8eaf6;
      --text-muted: #7986cb;
      --border: rgba(255,255,255,0.08);
      --accent-chinese: #ff7043;
      --accent-math: #42a5f5;
      --accent-english: #ab47bc;
      --accent-olympiad: #ffd54f;
      --glow: rgba(129,212,250,0.15);
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: 'Noto Sans SC', sans-serif;
      background: var(--bg-deep);
      color: var(--text);
      min-height: 100vh;
      overflow-x: hidden;
    }

    /* ====== STARFIELD BACKGROUND ====== */
    #cosmos {
      position: fixed;
      inset: 0;
      z-index: 0;
      overflow: hidden;
    }
    .star {
      position: absolute;
      border-radius: 50%;
      background: white;
      animation: twinkle var(--d) ease-in-out infinite alternate;
    }
    @keyframes twinkle { from { opacity: 0.1; transform: scale(0.8); } to { opacity: 1; transform: scale(1.2); } }

    /* ====== NEBULA ORBS ====== */
    .nebula {
      position: fixed;
      border-radius: 50%;
      filter: blur(80px);
      opacity: 0.12;
      z-index: 0;
      animation: drift 20s ease-in-out infinite alternate;
    }
    .nebula-1 { width: 500px; height: 500px; background: #1a237e; top: -100px; left: -100px; animation-delay: 0s; }
    .nebula-2 { width: 400px; height: 400px; background: #4a148c; bottom: -80px; right: -80px; animation-delay: -7s; }
    .nebula-3 { width: 350px; height: 350px; background: #00695c; top: 40%; left: 50%; animation-delay: -14s; }
    @keyframes drift {
      0% { transform: translate(0, 0) scale(1); }
      100% { transform: translate(30px, 20px) scale(1.1); }
    }

    /* ====== LAYOUT ====== */
    .app {
      position: relative;
      z-index: 1;
      max-width: 1200px;
      margin: 0 auto;
      padding: 40px 24px;
    }

    /* ====== HEADER ====== */
    .header {
      text-align: center;
      margin-bottom: 48px;
      animation: fadeInDown 0.8s ease;
    }
    @keyframes fadeInDown {
      from { opacity: 0; transform: translateY(-30px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .header-emoji {
      font-size: 56px;
      display: block;
      margin-bottom: 12px;
      animation: float 3s ease-in-out infinite;
    }
    @keyframes float {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(-10px); }
    }

    .header h1 {
      font-family: 'Ma Shan Zheng', cursive;
      font-size: 42px;
      background: linear-gradient(135deg, #81d4fa, #b39ddb, #ffab91);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      margin-bottom: 8px;
    }

    .header-sub {
      color: var(--text-muted);
      font-size: 15px;
      font-weight: 300;
      letter-spacing: 2px;
    }

    .stats-bar {
      display: flex;
      justify-content: center;
      gap: 32px;
      margin-top: 20px;
      flex-wrap: wrap;
    }
    .stat {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 8px 16px;
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: 24px;
      font-size: 13px;
      color: var(--text-muted);
    }
    .stat-num {
      color: var(--text);
      font-weight: 700;
      font-size: 16px;
    }

    /* ====== SUBJECT NAV ====== */
    .subject-nav {
      display: flex;
      justify-content: center;
      gap: 12px;
      margin-bottom: 40px;
      flex-wrap: wrap;
      animation: fadeIn 1s ease 0.3s both;
    }
    @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

    .nav-btn {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 10px 22px;
      border-radius: 32px;
      border: 1.5px solid var(--border);
      background: var(--bg-card);
      color: var(--text-muted);
      font-size: 14px;
      font-weight: 500;
      cursor: pointer;
      transition: all 0.3s ease;
      font-family: 'Noto Sans SC', sans-serif;
    }
    .nav-btn:hover {
      transform: translateY(-2px);
      border-color: rgba(255,255,255,0.2);
      color: var(--text);
    }
    .nav-btn.active {
      color: white;
      border-color: transparent;
      box-shadow: 0 4px 20px var(--glow);
    }
    .nav-btn[data-sub="chinese"].active { background: linear-gradient(135deg, #e64a19, #ff7043); border-color: #ff7043; }
    .nav-btn[data-sub="math"].active { background: linear-gradient(135deg, #1565c0, #42a5f5); border-color: #42a5f5; }
    .nav-btn[data-sub="english"].active { background: linear-gradient(135deg, #7b1fa2, #ab47bc); border-color: #ab47bc; }
    .nav-btn[data-sub="olympiad"].active { background: linear-gradient(135deg, #f57f17, #ffd54f); border-color: #ffd54f; color: #333; }

    /* ====== SUBJECT HEADER ====== */
    .subject-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 24px;
      flex-wrap: wrap;
      gap: 12px;
      animation: slideIn 0.5s ease;
    }
    @keyframes slideIn { from { opacity: 0; transform: translateX(-20px); } to { opacity: 1; transform: translateX(0); } }

    .subject-title {
      display: flex;
      align-items: center;
      gap: 14px;
    }
    .subject-icon {
      width: 52px;
      height: 52px;
      border-radius: 16px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 26px;
    }
    .subject-icon.chinese { background: linear-gradient(135deg, #bf360c, #ff7043); }
    .subject-icon.math { background: linear-gradient(135deg, #0d47a1, #42a5f5); }
    .subject-icon.english { background: linear-gradient(135deg, #4a148c, #ab47bc); }
    .subject-icon.olympiad { background: linear-gradient(135deg, #f57f17, #ffd54f); }

    .subject-title h2 {
      font-family: 'Ma Shan Zheng', cursive;
      font-size: 32px;
    }
    .subject-title p {
      color: var(--text-muted);
      font-size: 13px;
      margin-top: 2px;
    }

    .progress-ring-wrap {
      display: flex;
      align-items: center;
      gap: 12px;
    }
    .progress-ring-text {
      text-align: right;
    }
    .progress-ring-text strong {
      display: block;
      font-size: 22px;
      font-weight: 700;
    }
    .progress-ring-text span {
      color: var(--text-muted);
      font-size: 12px;
    }

    /* ====== UNIT GRID ====== */
    .units-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
      gap: 20px;
    }

    /* ====== UNIT CARD ====== */
    .unit-card {
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: 20px;
      padding: 24px;
      cursor: pointer;
      transition: all 0.35s cubic-bezier(0.34, 1.56, 0.64, 1);
      animation: cardIn 0.6s ease both;
      position: relative;
      overflow: hidden;
    }
    .unit-card::before {
      content: '';
      position: absolute;
      top: 0; left: 0; right: 0;
      height: 3px;
      opacity: 0;
      transition: opacity 0.3s ease;
    }
    .unit-card.chinese::before { background: linear-gradient(90deg, #e64a19, #ff7043); }
    .unit-card.math::before { background: linear-gradient(90deg, #1565c0, #42a5f5); }
    .unit-card.english::before { background: linear-gradient(90deg, #7b1fa2, #ab47bc); }
    .unit-card.olympiad::before { background: linear-gradient(90deg, #f57f17, #ffd54f); }

    .unit-card:hover {
      transform: translateY(-6px);
      border-color: rgba(255,255,255,0.15);
      box-shadow: 0 16px 40px rgba(0,0,0,0.4);
    }
    .unit-card:hover::before { opacity: 1; }

    .unit-card.chinese:hover { box-shadow: 0 16px 40px rgba(230,74,25,0.2); }
    .unit-card.math:hover { box-shadow: 0 16px 40px rgba(21,101,192,0.2); }
    .unit-card.english:hover { box-shadow: 0 16px 40px rgba(123,31,162,0.2); }
    .unit-card.olympiad:hover { box-shadow: 0 16px 40px rgba(245,127,23,0.2); }

    @keyframes cardIn {
      from { opacity: 0; transform: translateY(20px) scale(0.95); }
      to { opacity: 1; transform: translateY(0) scale(1); }
    }

    .unit-number {
      font-size: 11px;
      font-weight: 700;
      letter-spacing: 2px;
      text-transform: uppercase;
      opacity: 0.4;
      margin-bottom: 8px;
    }
    .unit-card.chinese .unit-number { color: #ff7043; }
    .unit-card.math .unit-number { color: #42a5f5; }
    .unit-card.english .unit-number { color: #ab47bc; }
    .unit-card.olympiad .unit-number { color: #ffd54f; }

    .unit-title {
      font-size: 18px;
      font-weight: 700;
      margin-bottom: 10px;
      line-height: 1.3;
    }

    .unit-topics {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
      margin-bottom: 14px;
    }
    .topic-tag {
      padding: 3px 10px;
      border-radius: 12px;
      font-size: 11px;
      background: rgba(255,255,255,0.06);
      color: var(--text-muted);
      border: 1px solid rgba(255,255,255,0.06);
      transition: all 0.2s ease;
    }
    .topic-tag:hover { background: rgba(255,255,255,0.12); color: var(--text); }
    .topic-tag.mastered { background: rgba(46,204,113,0.15); border-color: rgba(46,204,113,0.3); color: #2ecc71; }

    .unit-footer {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-top: 14px;
      padding-top: 14px;
      border-top: 1px solid var(--border);
    }
    .mastery-bar {
      width: 100px;
      height: 4px;
      background: rgba(255,255,255,0.08);
      border-radius: 4px;
      overflow: hidden;
    }
    .mastery-fill {
      height: 100%;
      border-radius: 4px;
      background: linear-gradient(90deg, #2ecc71, #27ae60);
      transition: width 0.6s ease;
    }
    .mastery-label {
      font-size: 12px;
      color: var(--text-muted);
    }

    /* ====== DETAIL MODAL ====== */
    .modal-overlay {
      position: fixed;
      inset: 0;
      background: rgba(5,5,16,0.85);
      backdrop-filter: blur(8px);
      z-index: 100;
      display: none;
      align-items: center;
      justify-content: center;
      padding: 24px;
    }
    .modal-overlay.open { display: flex; }

    .modal {
      background: #0d1117;
      border: 1px solid var(--border);
      border-radius: 24px;
      max-width: 680px;
      width: 100%;
      max-height: 85vh;
      overflow-y: auto;
      animation: modalIn 0.4s cubic-bezier(0.34, 1.56, 0.64, 1);
    }
    @keyframes modalIn {
      from { opacity: 0; transform: scale(0.9) translateY(20px); }
      to { opacity: 1; transform: scale(1) translateY(0); }
    }

    .modal-header {
      padding: 28px 28px 20px;
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      justify-content: space-between;
      position: sticky;
      top: 0;
      background: #0d1117;
      z-index: 2;
    }
    .modal-header h3 {
      font-family: 'Ma Shan Zheng', cursive;
      font-size: 26px;
    }
    .modal-close {
      width: 36px; height: 36px;
      border-radius: 50%;
      border: 1px solid var(--border);
      background: var(--bg-card);
      color: var(--text-muted);
      font-size: 18px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: all 0.2s ease;
    }
    .modal-close:hover { background: rgba(255,255,255,0.1); color: white; }

    .modal-body { padding: 24px 28px 28px; }

    .knowledge-list { list-style: none; display: flex; flex-direction: column; gap: 10px; }
    .knowledge-item {
      display: flex;
      align-items: flex-start;
      gap: 12px;
      padding: 14px 16px;
      background: var(--bg-card);
      border-radius: 12px;
      border: 1px solid var(--border);
      transition: all 0.25s ease;
      cursor: pointer;
    }
    .knowledge-item:hover {
      background: var(--bg-card-hover);
      border-color: rgba(255,255,255,0.15);
      transform: translateX(4px);
    }
    .knowledge-check {
      width: 22px; height: 22px;
      border-radius: 6px;
      border: 2px solid rgba(255,255,255,0.2);
      flex-shrink: 0;
      margin-top: 1px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 12px;
      color: transparent;
      transition: all 0.3s ease;
    }
    .knowledge-item.learned .knowledge-check {
      background: linear-gradient(135deg, #2ecc71, #27ae60);
      border-color: #2ecc71;
      color: white;
    }
    .knowledge-text { flex: 1; }
    .knowledge-title { font-weight: 600; font-size: 15px; margin-bottom: 3px; }
    .knowledge-desc { font-size: 12px; color: var(--text-muted); line-height: 1.5; }

    /* ====== FIREBASE STATUS ====== */
    .db-status {
      position: fixed;
      bottom: 20px;
      right: 20px;
      padding: 8px 14px;
      border-radius: 20px;
      font-size: 12px;
      border: 1px solid var(--border);
      background: rgba(13,17,23,0.9);
      backdrop-filter: blur(8px);
      z-index: 50;
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .db-dot {
      width: 8px; height: 8px;
      border-radius: 50%;
      background: #888;
    }
    .db-dot.connected { background: #2ecc71; box-shadow: 0 0 8px #2ecc71; }
    .db-dot.loading { background: #ffd54f; animation: pulse 1s ease infinite; }
    .db-dot.error { background: #e74c3c; }
    @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.4; } }

    /* ====== FLOATING ORBS ====== */
    .orb {
      position: fixed;
      border-radius: 50%;
      z-index: 0;
      pointer-events: none;
    }
    .orb-1 { width: 6px; height: 6px; background: #81d4fa; top: 20%; left: 15%; animation: floatOrb 8s ease-in-out infinite; }
    .orb-2 { width: 4px; height: 4px; background: #ce93d8; top: 60%; right: 20%; animation: floatOrb 12s ease-in-out infinite reverse; }
    .orb-3 { width: 5px; height: 5px; background: #ffcc80; bottom: 30%; left: 25%; animation: floatOrb 10s ease-in-out infinite 3s; }
    @keyframes floatOrb {
      0%, 100% { transform: translate(0, 0); opacity: 0.4; }
      33% { transform: translate(20px, -30px); opacity: 0.8; }
      66% { transform: translate(-15px, 20px); opacity: 0.5; }
    }

    /* ====== SCROLLBAR ====== */
    ::-webkit-scrollbar { width: 5px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.15); border-radius: 4px; }
    ::-webkit-scrollbar-thumb:hover { background: rgba(255,255,255,0.25); }

    /* ====== RESPONSIVE ====== */
    @media (max-width: 600px) {
      .header h1 { font-size: 30px; }
      .subject-title h2 { font-size: 26px; }
      .units-grid { grid-template-columns: 1fr; }
      .stats-bar { gap: 12px; }
    }

    /* ====== LOADING STATE ====== */
    .skeleton {
      background: linear-gradient(90deg, rgba(255,255,255,0.04) 25%, rgba(255,255,255,0.08) 50%, rgba(255,255,255,0.04) 75%);
      background-size: 200% 100%;
      animation: shimmer 1.5s infinite;
      border-radius: 20px;
      height: 200px;
    }
    @keyframes shimmer { 0% { background-position: 200% 0; } 100% { background-position: -200% 0; } }
  </style>
</head>
<body>

  <div id="cosmos"></div>
  <div class="nebula nebula-1"></div>
  <div class="nebula nebula-2"></div>
  <div class="nebula nebula-3"></div>
  <div class="orb orb-1"></div>
  <div class="orb orb-2"></div>
  <div class="orb orb-3"></div>

  <div class="app">
    <!-- HEADER -->
    <header class="header">
      <span class="header-emoji">🌌</span>
      <h1>尚融知识宇宙</h1>
      <p class="header-sub">WU SHANGRONG · STUDY COSMOS · 2026</p>
      <div class="stats-bar">
        <div class="stat">📚 <span class="stat-num" id="stat-units">—</span> 知识单元</div>
        <div class="stat">✨ <span class="stat-num" id="stat-topics">—</span> 知识点</div>
        <div class="stat">🏆 <span class="stat-num" id="stat-mastery">—</span>% 掌握率</div>
      </div>
    </header>

    <!-- SUBJECT NAV -->
    <nav class="subject-nav">
      <button class="nav-btn active" data-sub="chinese">📘 语文</button>
      <button class="nav-btn" data-sub="math">📐 数学</button>
      <button class="nav-btn" data-sub="english">📗 英语</button>
      <button class="nav-btn" data-sub="olympiad">🏅 奥数</button>
    </nav>

    <!-- CONTENT AREA -->
    <div id="content">
      <div id="content-placeholder">
        <div class="skeleton" style="margin-bottom:20px"></div>
        <div class="skeleton" style="margin-bottom:20px"></div>
        <div class="skeleton"></div>
      </div>
    </div>
  </div>

  <!-- DATABASE STATUS -->
  <div class="db-status">
    <div class="db-dot loading" id="db-dot"></div>
    <span id="db-text">连接数据库...</span>
  </div>

  <!-- DETAIL MODAL -->
  <div class="modal-overlay" id="modal-overlay">
    <div class="modal">
      <div class="modal-header">
        <h3 id="modal-title">Unit</h3>
        <button class="modal-close" onclick="closeModal()">✕</button>
      </div>
      <div class="modal-body">
        <ul class="knowledge-list" id="modal-list"></ul>
      </div>
    </div>
  </div>

  <!-- ========== FIREBASE SDK ========== -->
  <script type="module">
    import { initializeApp } from 'https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js';
    import { getFirestore, collection, getDocs, updateDoc, doc, setDoc, getDoc, onSnapshot } from 'https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js';

    // ================================================
    // 🔥 FIREBASE CONFIG — shengrong-study 项目
    // ================================================
    const firebaseConfig = {
      apiKey: "AIzaSyDozO5pxNezP-68VPCMKcpnyVpWC5uMnBI",
      authDomain: "shengrong-study.firebaseapp.com",
      projectId: "shengrong-study",
      storageBucket: "shengrong-study.firebasestorage.app",
      messagingSenderId: "247420104511",
      appId: "1:247420104511:web:69be22a77356fabb8f6d8a",
      measurementId: "G-M51GJ9E0L1"
    };

    let db;
    let currentSubject = 'chinese';
    let allData = {};
    let progressData = {};

    // ================================================
    // INIT
    // ================================================
    function setDbStatus(status, text) {
      const dot = document.getElementById('db-dot');
      const txt = document.getElementById('db-text');
      dot.className = 'db-dot ' + status;
      txt.textContent = text;
    }

    async function init() {
      try {
        // 检测网络环境：先测试 Firebase 是否可达
        setDbStatus('loading', '检测网络...');

        const controller = new AbortController();
        const timeoutId = setTimeout(() => controller.abort(), 5000);

        let firebaseReachable = false;
        try {
          await fetch('https://firestore.googleapis.com/', { mode: 'no-cors', signal: controller.signal });
          firebaseReachable = true;
        } catch (e) {
          firebaseReachable = false;
        }
        clearTimeout(timeoutId);

        if (!firebaseReachable) {
          // Firebase 不可达（国内网络），直接用本地模式
          setDbStatus('connected', '本地模式 🇨🇳');
          loadBuiltinData();
          return;
        }

        const app = initializeApp(firebaseConfig);
        db = getFirestore(app);
        setDbStatus('loading', '加载数据...');

        // 监听知识树数据（5秒超时）
        const treeTimeout = setTimeout(() => {
          setDbStatus('connected', '本地模式 🇨🇳');
          loadBuiltinData();
        }, 5000);

        const unsubTree = onSnapshot(collection(db, 'knowledgeTree'), (snap) => {
          clearTimeout(treeTimeout);
          const treeData = {};
          snap.forEach(d => { treeData[d.id] = d.data(); });
          mergeData(treeData, 'tree');
          setDbStatus('connected', '实时同步 ✓');
        }, (err) => {
          clearTimeout(treeTimeout);
          console.error('Tree error:', err);
          setDbStatus('connected', '本地模式 🇨🇳');
          loadBuiltinData();
        });

        // 监听进度数据
        const unsubProgress = onSnapshot(collection(db, 'progress'), (snap) => {
          progressData = {};
          snap.forEach(d => { progressData[d.id] = d.data(); });
          renderAll();
        });

      } catch (e) {
        console.error('Firebase init error:', e);
        setDbStatus('connected', '本地模式 🇨🇳');
        loadBuiltinData();
      }
    }

    // ================================================
    // 内置数据（Firebase 未配置时使用）
    // ================================================
    function loadBuiltinData() {
      allData = getBuiltinKnowledgeTree();
      renderAll();
    }

    function getBuiltinKnowledgeTree() {
      return {
        chinese: {
          name: '语文', emoji: '📘', color: '#ff7043',
          units: [

    // ================================================
    // MERGE DATA (Firebase + Builtin)
    // ================================================
    function mergeData(firebaseTree, type) {
      if (type === 'tree' && Object.keys(firebaseTree).length > 0) {
        allData = { ...allData, ...firebaseTree };
      }
      renderAll();
    }

    // ================================================
    // RENDER
    // ================================================
    function renderAll() {
      const data = allData[currentSubject];
      if (!data) return;

      renderHeader(data);
      renderUnits(data);
      updateStats();
    }

    function renderHeader(data) {
      const mastered = countMastered();
      const total = countTotal();
      const pct = total > 0 ? Math.round((mastered / total) * 100) : 0;

      const content = document.getElementById('content');
      content.innerHTML = `
        <div class="subject-header">
          <div class="subject-title">
            <div class="subject-icon ${currentSubject}">${data.emoji}</div>
            <div>
              <h2 style="color: ${data.color}">${data.name}</h2>
              <p>${data.units.length} 个知识单元 · ${countTopics(data)} 个知识点</p>
            </div>
          </div>
          <div class="progress-ring-wrap">
            <div class="progress-ring-text">
              <strong style="color: ${data.color}">${pct}%</strong>
              <span>总体掌握</span>
            </div>
            <svg width="56" height="56" viewBox="0 0 56 56">
              <circle cx="28" cy="28" r="22" fill="none" stroke="rgba(255,255,255,0.08)" stroke-width="5"/>
              <circle cx="28" cy="28" r="22" fill="none" stroke="${data.color}" stroke-width="5"
                stroke-dasharray="${2*Math.PI*22}" stroke-dashoffset="${2*Math.PI*22*(1-pct/100)}"
                stroke-linecap="round" transform="rotate(-90 28 28)" style="transition: stroke-dashoffset 0.8s ease"/>
            </svg>
          </div>
        </div>
        <div class="units-grid" id="units-grid"></div>
      `;
    }

    function renderUnits(data) {
      const grid = document.getElementById('units-grid');
      grid.innerHTML = '';

      data.units.forEach((unit, i) => {
        const learned = unit.knowledge ? unit.knowledge.filter(k => k.learned).length : 0;
        const total = unit.knowledge ? unit.knowledge.length : 0;
        const pct = total > 0 ? Math.round((learned / total) * 100) : 0;

        const topicsHTML = unit.topics.map(t => `<span class="topic-tag">${t}</span>`).join('');
        const topicsHTMLwithMastered = unit.topics.map(t => `<span class="topic-tag mastered">${t}</span>`).join('');

        const card = document.createElement('div');
        card.className = `unit-card ${currentSubject}`;
        card.style.animationDelay = `${i * 0.06}s`;
        card.onclick = () => openModal(unit);

        card.innerHTML = `
          <div class="unit-number">${unit.num}</div>
          <div class="unit-title">${unit.title}</div>
          <div class="unit-topics">${topicsHTML}</div>
          <div class="unit-footer">
            <div class="mastery-bar"><div class="mastery-fill" style="width:${pct}%"></div></div>
            <span class="mastery-label">${learned}/${total} 已掌握</span>
          </div>
        `;
        grid.appendChild(card);
      });
    }

    function updateStats() {
      const totalUnits = Object.values(allData).reduce((s, d) => s + (d.units ? d.units.length : 0), 0);
      const totalTopics = Object.values(allData).reduce((s, d) => s + countTopics(d), 0);
      const mastered = Object.values(allData).reduce((s, d) => s + countMasteredInSubject(d), 0);
      const total = Object.values(allData).reduce((s, d) => s + countTotalInSubject(d), 0);
      const pct = total > 0 ? Math.round((mastered / total) * 100) : 0;

      document.getElementById('stat-units').textContent = totalUnits;
      document.getElementById('stat-topics').textContent = totalTopics;
      document.getElementById('stat-mastery').textContent = pct;
    }

    function countTopics(data) { return data.units ? data.units.reduce((s, u) => s + (u.knowledge ? u.knowledge.length : 0), 0) : 0; }
    function countMastered() {
      return Object.values(allData).reduce((s, d) => s + countMasteredInSubject(d), 0);
    }
    function countTotal() {
      return Object.values(allData).reduce((s, d) => s + countTotalInSubject(d), 0);
    }
    function countMasteredInSubject(data) { return data.units ? data.units.reduce((s, u) => s + (u.knowledge ? u.knowledge.filter(k => k.learned).length : 0), 0) : 0; }
    function countTotalInSubject(data) { return data.units ? data.units.reduce((s, u) => s + (u.knowledge ? u.knowledge.length : 0), 0) : 0; }

    // ================================================
    // MODAL
    // ================================================
    function openModal(unit) {
      const overlay = document.getElementById('modal-overlay');
      const title = document.getElementById('modal-title');
      const list = document.getElementById('modal-list');

      title.textContent = `${unit.num} · ${unit.title}`;
      list.innerHTML = (unit.knowledge || []).map(k => `
        <li class="knowledge-item ${k.learned ? 'learned' : ''}" data-id="${k.id}" onclick="toggleLearn('${k.id}')">
          <div class="knowledge-check">✓</div>
          <div class="knowledge-text">
            <div class="knowledge-title">${k.title}</div>
            <div class="knowledge-desc">${k.desc}</div>
          </div>
        </li>
      `).join('');

      overlay.classList.add('open');
    }

    window.closeModal = function() {
      document.getElementById('modal-overlay').classList.remove('open');
    };

    document.getElementById('modal-overlay').addEventListener('click', function(e) {
      if (e.target === this) closeModal();
    });

    // ================================================
    // TOGGLE LEARN STATUS
    // ================================================
    window.toggleLearn = async function(kid) {
      // Find and toggle
      for (const sub of Object.values(allData)) {
        for (const unit of (sub.units || [])) {
          const k = (unit.knowledge || []).find(k => k.id === kid);
          if (k) {
            k.learned = !k.learned;

            // Save to Firebase if connected
            if (db && firebaseConfig.apiKey !== 'YOUR_API_KEY') {
              try {
                const ref = doc(db, 'progress', kid);
                await setDoc(ref, { learned: k.learned, updated: new Date().toISOString() }, { merge: true });
              } catch (e) {
                console.error('Save error:', e);
              }
            } else {
              // Save to localStorage
              const stored = JSON.parse(localStorage.getItem('shengrong_progress') || '{}');
              stored[kid] = k.learned;
              localStorage.setItem('shengrong_progress', JSON.stringify(stored));
            }

            // Update UI
            const el = document.querySelector(`.knowledge-item[data-id="${kid}"]`);
            if (el) el.classList.toggle('learned', k.learned);
            renderAll();
            return;
          }
        }
      }
    };

    // ================================================
    // NAVIGATION
    // ================================================
    document.querySelectorAll('.nav-btn').forEach(btn => {
      btn.addEventListener('click', function() {
        document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
        this.classList.add('active');
        currentSubject = this.dataset.sub;
        renderAll();
      });
    });

    // ================================================
    // STARFIELD GENERATOR
    // ================================================
    function createStars() {
      const cosmos = document.getElementById('cosmos');
      for (let i = 0; i < 200; i++) {
        const star = document.createElement('div');
        star.className = 'star';
        const size = Math.random() * 2.5 + 0.5;
        star.style.cssText = `
          width:${size}px; height:${size}px;
          top:${Math.random()*100}%;
          left:${Math.random()*100}%;
          --d:${(Math.random()*3+1).toFixed(1)}s;
          animation-delay:${(Math.random()*4).toFixed(1)}s;
        `;
        cosmos.appendChild(star);
      }
    }

    // ================================================
    // LOCALSTORAGE PROGRESS RESTORE
    // ================================================
    function restoreProgress() {
      const stored = JSON.parse(localStorage.getItem('shengrong_progress') || '{}');
      for (const sub of Object.values(allData)) {
        for (const unit of (sub.units || [])) {
          for (const k of (unit.knowledge || [])) {
            if (stored[k.id] !== undefined) k.learned = stored[k.id];
          }
        }
      }
    }

    // ================================================
    // START
    // ================================================
    createStars();
    restoreProgress();
    init();

    // Keyboard shortcut
    document.addEventListener('keydown', e => {
      if (e.key === 'Escape') closeModal();
    });
  </script>
</body>
