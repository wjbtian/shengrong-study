  <div class="nav-section" style="margin-top:auto;padding-top:20px;border-top:1px solid var(--border)">

    </a>
  </div>
</aside>

  
  <main class="main">
    <!-- 英雄区 -->
    <div class="shine-hero">
      <div class="shine-hero-content">
        <h1 class="shine-hero-title">✨ 闪光时刻</h1>
        <p class="shine-hero-subtitle">记录成长路上的每一个精彩瞬间</p>
        <button class="btn btn-primary btn-large" onclick="openModal('modal-shine')">
          <span>📸 记录新闪光</span>
        </button>
      </div>
    </div>

    <!-- 精选照片墙 -->
    <section class="shine-section">
      <div class="section-header">
        <h2 class="section-title">📸 精选高光</h2>
        <p class="section-subtitle">最近最精彩的瞬间</p>
      </div>
      <div id="shine-featured" class="shine-featured-wall"></div>
    </section>

    <!-- 分类快速入口 -->
    <section class="shine-section">
      <div class="section-header">
        <h2 class="section-title">🏷️ 分类浏览</h2>
        <p class="section-subtitle">按类别查看所有闪光时刻</p>
      </div>
      <div class="shine-categories">
        <div class="shine-category-card" onclick="showCategory('获奖')">
          <div class="shine-category-icon">🏆</div>
          <div class="shine-category-name">获奖荣誉</div>
          <div class="shine-category-count" id="count-获奖">0 个闪光</div>
          <div class="shine-category-preview" id="preview-获奖"></div>
        </div>
        <div class="shine-category-card" onclick="showCategory('运动')">
          <div class="shine-category-icon">🚴</div>
          <div class="shine-category-name">运动时刻</div>
          <div class="shine-category-desc">爬山、羽毛球、骑车</div>
          <div class="shine-category-count" id="count-运动">0 个闪光</div>
          <div class="shine-category-preview" id="preview-运动"></div>
        </div>
        <div class="shine-category-card" onclick="showCategory('创作')">
          <div class="shine-category-icon">🎨</div>
          <div class="shine-category-name">创意作品</div>
          <div class="shine-category-count" id="count-创作">0 个闪光</div>
          <div class="shine-category-preview" id="preview-创作"></div>
        </div>
        <div class="shine-category-card" onclick="showCategory('表演')">
          <div class="shine-category-icon">🎤</div>
          <div class="shine-category-name">才艺展示</div>
          <div class="shine-category-desc">演出、表演、展示</div>
          <div class="shine-category-count" id="count-表演">0 个闪光</div>
          <div class="shine-category-preview" id="preview-表演"></div>
        </div>
        <div class="shine-category-card" onclick="showCategory('进步')">
          <div class="shine-category-icon">🌟</div>
          <div class="shine-category-name">进步突破</div>
          <div class="shine-category-count" id="count-进步">0 个闪光</div>
          <div class="shine-category-preview" id="preview-进步"></div>
        </div>
        <div class="shine-category-card" onclick="showCategory('好人好事')">
          <div class="shine-category-icon">❤️</div>
          <div class="shine-category-name">好人好事</div>
          <div class="shine-category-count" id="count-好人好事">0 个闪光</div>
          <div class="shine-category-preview" id="preview-好人好事"></div>
        </div>
        <div class="shine-category-card" onclick="showCategory('其他')">
          <div class="shine-category-icon">💡</div>
          <div class="shine-category-name">其他精彩</div>
          <div class="shine-category-count" id="count-其他">0 个闪光</div>
          <div class="shine-category-preview" id="preview-其他"></div>
        </div>
      </div>
    </section>

    <!-- 分类时间线（默认隐藏，点击分类后显示） -->
    <section class="shine-section" id="category-timeline-section" style="display:none;">
      <div class="section-header">
        <button class="btn-back" onclick="hideCategory()">← 返回分类</button>
        <h2 class="section-title" id="category-title">🏆 获奖荣誉</h2>
        <p class="section-subtitle" id="category-subtitle">按时间顺序查看所有记录</p>
      </div>
      <div id="category-timeline" class="category-timeline"></div>
    </section>
  </main>
</div>

<!-- 闪光弹窗 -->
<div class="modal" id="modal-shine">
  <div class="modal-overlay" onclick="closeModal('modal-shine')"></div>
  <div class="modal-content">
    <div class="modal-header">
      <h3 class="modal-title">✨ 记录闪光时刻</h3>
      <button class="modal-close" onclick="closeModal('modal-shine')">✕</button>
    </div>
    <div class="modal-body">
      <input type="text" class="input" id="shine-title" placeholder="标题">
      <div class="form-group">
        <select id="shine-type">
          <option value="🏆 获奖">🏆 获奖</option>
          <option value="🚴 运动">🚴 运动（爬山/羽毛球/骑车等）</option>
          <option value="🎨 创作">🎨 创作</option>
          <option value="🎤 表演">🎤 才艺展示</option>
          <option value="💡 发现">💡 发现</option>
          <option value="🌟 进步">🌟 进步</option>
          <option value="❤️ 好人好事">❤️ 好人好事</option>
        </select>
      </div>
      <textarea class="textarea" id="shine-desc" placeholder="描述这个精彩瞬间..."></textarea>
      <div class="form-group">
        <label style="color:var(--text2);font-size:13px;margin-bottom:8px;display:block;">📸 上传照片</label>
        <input type="file" class="input" id="shine-photo" accept="image/*" onchange="previewShinePhoto(this)">
        <div id="shine-photo-preview" style="margin-top:12px;display:none;">
          <img id="shine-photo-preview-img" style="max-width:100%;max-height:200px;border-radius:8px;border:1px solid var(--border);">
          <button type="button" class="btn" style="margin-top:8px;font-size:12px;" onclick="clearShinePhoto()">清除</button>
        </div>
      </div>
    </div>
    <div class="modal-footer">
      <button class="btn" onclick="closeModal('modal-shine')">取消</button>
      <button class="btn btn-primary" onclick="saveShine()">保存</button>
    </div>
  </div>
</div>

<script src="app.js"></script>
<script>
  document.querySelectorAll('.nav-item').forEach(n => {
    if (n.getAttribute('href') === 'shine.html') n.classList.add('active');
  });
  renderShine();
  
  // 数据存储
  let allShinesData = [];
  let currentCategory = null;
  
  // 显示分类时间线
  function showCategory(category) {
    currentCategory = category;
    const filtered = allShinesData.filter(s => s.type && s.type.includes(category));
    
    // 隐藏分类入口，显示时间线
    document.querySelector('.shine-categories').style.display = 'none';
    document.getElementById('category-timeline-section').style.display = 'block';
    document.getElementById('category-title').textContent = getCategoryEmoji(category) + ' ' + getCategoryName(category);
    document.getElementById('category-subtitle').textContent = `共 ${filtered.length} 个闪光时刻，按时间顺序查看`;
    
    renderCategoryTimeline(filtered);
    
    // 滚动到时间线区域
    document.getElementById('category-timeline-section').scrollIntoView({ behavior: 'smooth' });
  }
  
  function hideCategory() {
    currentCategory = null;
    document.querySelector('.shine-categories').style.display = 'grid';
    document.getElementById('category-timeline-section').style.display = 'none';
    window.scrollTo({ top: 0, behavior: 'smooth' });
  }
  
  function getCategoryEmoji(cat) {
    const map = { '获奖': '🏆', '运动': '🚴', '创作': '🎨', '表演': '🎤', '进步': '🌟', '好人好事': '❤️', '其他': '💡' };
    return map[cat] || '✨';
  }
  
  function getCategoryName(cat) {
    const map = { '获奖': '获奖荣誉', '运动': '运动时刻', '创作': '创意作品', '表演': '才艺展示', '进步': '进步突破', '好人好事': '好人好事', '其他': '其他精彩' };
    return map[cat] || cat;
  }
  
  // 照片预览
  function previewShinePhoto(input) {
    const preview = document.getElementById('shine-photo-preview');
    const img = document.getElementById('shine-photo-preview-img');
    if (input.files && input.files[0]) {
      const reader = new FileReader();
      reader.onload = function(e) {
        img.src = e.target.result;
        preview.style.display = 'block';
      };
      reader.readAsDataURL(input.files[0]);
    }
  }
  
  function clearShinePhoto() {
    document.getElementById('shine-photo').value = '';
    document.getElementById('shine-photo-preview').style.display = 'none';
  }
  
  function renderCategoryTimeline(shines) {
    const container = document.getElementById('category-timeline');
    if (shines.length === 0) {
      container.innerHTML = `
        <div class="empty-state">
          <span class="emoji">✨</span>
          <p>这个分类还没有闪光时刻<br>快去添加第一个吧！</p>
        </div>
      `;
      return;
    }
    
    // 按月份分组
    const grouped = {};
    shines.forEach(s => {
      const d = new Date(s.date);
      const key = `${d.getFullYear()}年${d.getMonth()+1}月`;
      if (!grouped[key]) grouped[key] = [];
      grouped[key].push(s);
    });
    
    container.innerHTML = Object.entries(grouped).map(([month, items]) => `
      <div class="timeline-month">
        <div class="timeline-month-header">
          <span class="timeline-month-dot"></span>
          <h3 class="timeline-month-title">${month}</h3>
          <span class="timeline-month-count">${items.length} 个闪光</span>
        </div>
        <div class="timeline-month-photos">
          ${items.map(s => `
            <div class="timeline-photo-card" onclick="openLightbox('${s.photoUrl || ''}', '${s.title}')">
              ${s.photoUrl ? `
                <img src="${s.photoUrl}" loading="lazy">
              ` : `
                <div class="timeline-photo-placeholder">
                  <span>${s.icon || '✨'}</span>
                </div>
              `}
              <div class="timeline-photo-info">
                <div class="timeline-photo-title">${s.title}</div>
                <div class="timeline-photo-date">${new Date(s.date).getDate()}日</div>
              </div>
            </div>
          `).join('')}
        </div>
      </div>
    `).join('');
  }
  
  // 渲染精选照片墙（最近6张有图片的）
  function renderFeaturedWall() {
    const container = document.getElementById('shine-featured');
    const withPhotos = allShinesData.filter(s => s.photoUrl).slice(0, 6);
    
    if (withPhotos.length === 0) {
      container.innerHTML = `
        <div class="empty-state" style="grid-column: 1/-1;">
          <span class="emoji">📸</span>
          <p>还没有照片<br>点击"记录新闪光"添加第一张吧</p>
        </div>
      `;
      return;
    }
    
    // 瀑布流布局：不同大小
    container.innerHTML = withPhotos.map((s, i) => {
      const sizes = ['large', 'medium', 'small', 'small', 'medium', 'large'];
      const size = sizes[i] || 'medium';
      return `
        <div class="featured-photo ${size}" onclick="openLightbox('${s.photoUrl}', '${s.title}')">
          <img src="${s.photoUrl}" loading="lazy">
          <div class="featured-photo-overlay">
            <div class="featured-photo-title">${s.title}</div>
            <div class="featured-photo-type">${s.type || ''}</div>
          </div>
        </div>
      `;
    }).join('');
  }
  
  // 更新分类卡片
  function updateCategoryCards() {
    const categories = ['获奖', '运动', '创作', '表演', '进步', '好人好事', '其他'];
    
    categories.forEach(cat => {
      const filtered = allShinesData.filter(s => s.type && s.type.includes(cat));
      const countEl = document.getElementById(`count-${cat}`);
      const previewEl = document.getElementById(`preview-${cat}`);
      
      if (countEl) countEl.textContent = `${filtered.length} 个闪光`;
      
      // 显示最近3张预览图
      if (previewEl) {
        const recent = filtered.filter(s => s.photoUrl).slice(0, 3);
        if (recent.length > 0) {
          previewEl.innerHTML = recent.map(s => `
            <img src="${s.photoUrl}" class="category-preview-img" loading="lazy">
          `).join('');
        } else {
          previewEl.innerHTML = `<div class="category-preview-empty">暂无照片</div>`;
        }
      }
    });
  }
  
  async function likeShine(id) {
    await api('POST', `/shines/${id}/like`);
    renderShine();
  }
  
  // 灯箱查看
  function openLightbox(url, title) {
    if (!url) return;
    const lightbox = document.createElement('div');
    lightbox.className = 'lightbox';
    lightbox.innerHTML = `
      <div class="lightbox-backdrop" onclick="this.parentElement.remove()"></div>
      <div class="lightbox-content">
        <img src="${url}" class="lightbox-img">
        ${title ? `<div class="lightbox-title">${title}</div>` : ''}
        <button class="lightbox-close" onclick="this.parentElement.parentElement.remove()">✕</button>
      </div>
    `;
    document.body.appendChild(lightbox);
    document.body.style.overflow = 'hidden';
    lightbox.addEventListener('remove', () => {
      document.body.style.overflow = '';
    });
  }
  
  // 覆盖原renderShine
  renderShine = async function() {
    allShinesData = await api('GET', '/shines');
    
    // 渲染精选墙
    renderFeaturedWall();
    
    // 更新分类卡片
    updateCategoryCards();
    
    // 如果正在查看分类，更新时间线
    if (currentCategory) {
      const filtered = allShinesData.filter(s => s.type && s.type.includes(currentCategory));
      renderCategoryTimeline(filtered);
    }
  };
</script>
</body>
