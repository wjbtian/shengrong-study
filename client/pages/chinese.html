<!-- 语文页 - 横向鱼骨图设计 -->
<div class="subject-hero" style="--subject-color: var(--accent);">
  <div class="subject-hero-icon">📚</div>
  <div class="subject-hero-info">
    <h1 class="subject-hero-title">语文学习</h1>
    <p class="subject-hero-subtitle">四年级上册 · 8个单元 · 循序渐进</p>
  </div>
  <div class="subject-hero-progress">
    <div class="progress-ring-wrap">
      <svg viewBox="0 0 120 120" class="progress-ring">
        <circle cx="60" cy="60" r="54" fill="none" stroke="rgba(255,255,255,0.1)" stroke-width="8"/>
        <circle cx="60" cy="60" r="54" fill="none" stroke="var(--accent)" stroke-width="8" 
          stroke-dasharray="339.292" stroke-dashoffset="339.292" stroke-linecap="round" id="chinese-progress-ring"/>
      </svg>
      <div class="progress-ring-text">
        <div class="progress-percent" id="chinese-percent">0%</div>
      </div>
    </div>
    <div class="progress-count">
      <span id="chinese-done">0</span> / 8 单元
    </div>
  </div>
</div>

<!-- 横向鱼骨图 -->
<div class="fishbone-h-section">
  <div class="fishbone-h-header">
    <h2 class="section-title">📖 学习路线图</h2>
    <p class="section-subtitle">从左到右，循序渐进 · 点击单元查看详细内容</p>
  </div>
  
  <!-- 主干 -->
  <div class="fishbone-h-spine" id="chinese-fishbone-h">
    <div class="fishbone-h-start">🌱 开始</div>
    <!-- 动态生成单元节点 -->
    <div class="fishbone-h-end">🏆 完成</div>
  </div>
  
  <!-- 展开的详情区域 -->
  <div class="fishbone-h-detail" id="chinese-detail" style="display:none">
    <div class="detail-close" onclick="closeChineseDetail()">✕</div>
    <div class="fishbone-h-detail-content" id="chinese-detail-content">
      <!-- 动态填充 -->
    </div>
  </div>
</div>
