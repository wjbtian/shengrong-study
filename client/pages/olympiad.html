<!-- 奥数页 - 鱼骨图设计 -->
<div class="subject-hero" style="--subject-color: var(--yellow);">
  <div class="subject-hero-icon">🧠</div>
  <div class="subject-hero-info">
    <h1 class="subject-hero-title">奥数挑战</h1>
    <p class="subject-hero-subtitle">七大专题 · 20个知识点</p>
  </div>
  <div class="subject-hero-progress">
    <div class="progress-ring-wrap">
      <svg viewBox="0 0 120 120" class="progress-ring">
        <circle cx="60" cy="60" r="54" fill="none" stroke="rgba(255,255,255,0.1)" stroke-width="8"/>
        <circle cx="60" cy="60" r="54" fill="none" stroke="var(--yellow)" stroke-width="8" 
          stroke-dasharray="339.292" stroke-dashoffset="339.292" stroke-linecap="round" id="olympiad-progress-ring"/>
      </svg>
      <div class="progress-ring-text">
        <div class="progress-percent" id="olympiad-percent">0%</div>
      </div>
    </div>
    <div class="progress-count">
      <span id="olympiad-done">0</span> / 20 专题
    </div>
  </div>
</div>

<!-- 鱼骨图 -->
<div class="fishbone-section">
  <div class="timeline-header">
    <h2 class="section-title">专题地图</h2>
    <p class="section-subtitle">点击专题查看解题方法和例题</p>
  </div>
  <div class="fishbone" id="olympiad-fishbone">
    <!-- 动态生成 -->
  </div>
</div>
