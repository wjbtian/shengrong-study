<!-- 首页内容 -->
<div class="hero-section">
  <div class="hero-greeting" id="greeting">你好，永远的神！</div>
  <div class="hero-level">
    <svg viewBox="0 0 100 100">
      <circle cx="50" cy="50" r="45" fill="none" stroke="rgba(255,255,255,0.1)" stroke-width="6"/>
      <circle cx="50" cy="50" r="45" fill="none" stroke="var(--accent)" stroke-width="6" 
        stroke-dasharray="283" stroke-dashoffset="70" stroke-linecap="round"/>
    </svg>
    <div class="hero-level-center">
      <div class="level-num">3</div>
      <div class="level-label">探索者</div>
    </div>
  </div>
</div>

<div class="section-header">
  <h2 class="section-title">快速入口</h2>
</div>
<div class="quick-grid" id="quick-links">
  <div class="quick-card green" data-link="/diary">
    <div class="quick-card-icon">📝</div>
    <div class="quick-card-title">成长日记</div>
    <div class="quick-card-desc" id="diary-count">加载中...</div>
  </div>
  <div class="quick-card purple" data-link="/shine">
    <div class="quick-card-icon">✨</div>
    <div class="quick-card-title">闪光时刻</div>
    <div class="quick-card-desc" id="shine-count">加载中...</div>
  </div>
  <div class="quick-card blue" data-link="/guitar">
    <div class="quick-card-icon">🎸</div>
    <div class="quick-card-title">吉他练习</div>
    <div class="quick-card-desc" id="guitar-count">加载中...</div>
  </div>
  <div class="quick-card orange" data-link="/tech">
    <div class="quick-card-icon">🚀</div>
    <div class="quick-card-title">科技探索</div>
    <div class="quick-card-desc" id="tech-count">加载中...</div>
  </div>
</div>

<div class="section-header">
  <h2 class="section-title">今日任务</h2>
</div>
<div class="today-tasks" id="today-tasks">
  <div class="today-task" data-task="diary">
    <span class="task-check">⭕</span>
    <span>写一篇日记</span>
  </div>
  <div class="today-task" data-task="guitar">
    <span class="task-check">⭕</span>
    <span>练习吉他15分钟</span>
  </div>
  <div class="today-task" data-task="olympiad">
    <span class="task-check">⭕</span>
    <span>做一道奥数题</span>
  </div>
  <div class="today-task" data-task="read">
    <span class="task-check">⭕</span>
    <span>阅读30分钟</span>
  </div>
</div>

<div class="section-header">
  <h2 class="section-title">最近日记</h2>
  <button class="btn btn-text" data-link="/diary">查看全部 →</button>
</div>
<div id="recent-diary"></div>

<div class="section-header">
  <h2 class="section-title">最近闪光</h2>
  <button class="btn btn-text" data-link="/shine">查看全部 →</button>
</div>
<div id="recent-shine"></div>
