<!-- 数学页 - 思维导图网格设计 -->
<div class="subject-hero" style="--subject-color: var(--accent2);">
  <div class="subject-hero-icon">🔢</div>
  <div class="subject-hero-info">
    <h1 class="subject-hero-title">数学学习</h1>
    <p class="subject-hero-subtitle">苏教版四年级上册 · 8个单元 · 思维导图式学习</p>
  </div>
  <div class="subject-hero-progress">
    <div class="progress-ring-wrap">
      <svg viewBox="0 0 120 120" class="progress-ring">
        <circle cx="60" cy="60" r="54" fill="none" stroke="rgba(255,255,255,0.1)" stroke-width="8"/>
        <circle cx="60" cy="60" r="54" fill="none" stroke="var(--accent2)" stroke-width="8" 
          stroke-dasharray="339.292" stroke-dashoffset="339.292" stroke-linecap="round" id="math-progress-ring"/>
      </svg>
      <div class="progress-ring-text">
        <div class="progress-percent" id="math-percent">0%</div>
      </div>
    </div>
    <div class="progress-count">
      <span id="math-done">0</span> / 8 单元
    </div>
  </div>
</div>

<!-- 统计卡片 -->
<div class="subject-stats">
  <div class="subject-stat">
    <span class="subject-stat-value" id="math-formula-count">16</span>
    <span class="subject-stat-label">公式</span>
  </div>
  <div class="subject-stat">
    <span class="subject-stat-value" id="math-mistake-count">0</span>
    <span class="subject-stat-label">错题</span>
  </div>
  <div class="subject-stat">
    <span class="subject-stat-value" id="math-practice-count">0</span>
    <span class="subject-stat-label">练习</span>
  </div>
</div>

<!-- 思维导图网格 -->
<div class="mindmap-section">
  <div class="mindmap-header">
    <h2 class="section-title">🧠 知识网络</h2>
    <p class="section-subtitle">点击节点展开知识分支</p>
  </div>
  <div class="mindmap-grid" id="math-mindmap">
    <!-- 动态生成 -->
  </div>
</div>

<!-- 公式卡片区 -->
<div class="formula-section">
  <div class="section-header">
    <h2 class="section-title">📐 重点公式</h2>
    <p class="section-subtitle">本册核心公式与定理</p>
  </div>
  <div class="formula-grid" id="math-formulas">
    <!-- 动态生成 -->
  </div>
</div>

<!-- 错题本 -->
<div class="mistake-section">
  <div class="section-header">
    <h2 class="section-title">❌ 错题本</h2>
    <p class="section-subtitle">记录错题，避免再犯</p>
  </div>
  <div class="mistake-list" id="math-mistakes">
    <div class="mistake-empty">
      <div class="mistake-empty-icon">📝</div>
      <p>暂无错题记录</p>
      <span class="mistake-hint">在微信对话中发送错题照片，我会帮你记录</span>
    </div>
  </div>
</div>
