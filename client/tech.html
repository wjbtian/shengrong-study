<!-- 科技弹窗 -->
<div class="modal" id="modal-tech">
  <div class="modal-overlay" onclick="closeModal('modal-tech')"></div>
  <div class="modal-content">
    <div class="modal-header">
      <h3 class="modal-title">🔬 添加科技探索</h3>
      <button class="modal-close" onclick="closeModal('modal-tech')">✕</button>
    </div>
    <div class="modal-body">
      <input type="text" class="input" id="tech-title" placeholder="标题">
      <div class="form-group">
        <select id="tech-category">
          <option value="🚀 太空">🚀 太空</option>
          <option value="🤖 AI">🤖 AI</option>
          <option value="🦕 自然">🦕 自然</option>
          <option value="⚡ 能源">⚡ 能源</option>
          <option value="🐟 海洋">🐟 海洋</option>
          <option value="📡 通信">📡 通信</option>
          <option value="🧬 生物">🧬 生物</option>
          <option value="🌍 环境">🌍 环境</option>
          <option value="🚁 科技">🚁 科技</option>
          <option value="🌌 天文">🌌 天文</option>
          <option value="🐝 动物">🐝 动物</option>
          <option value="💻 计算机">💻 计算机</option>
          <option value="🌋 地理">🌋 地理</option>
          <option value="🎮 教育">🎮 教育</option>
          <option value="🔬 科学" selected>🔬 科学</option>
        </select>
      </div>
      <textarea class="textarea" id="tech-summary" placeholder="简单描述这条新闻..."></textarea>
    </div>
    <div class="modal-footer">
      <button class="btn" onclick="closeModal('modal-tech')">取消</button>
      <button class="btn btn-primary" onclick="saveTech()">保存</button>
    </div>
  </div>
</div>

<script src="app.js"></script>
<script>
  document.querySelectorAll('.nav-item').forEach(n => {
    if (n.getAttribute('href') === 'tech.html') n.classList.add('active');
  });
  renderTech();
</script>
