<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>永远的神的星球 ✨</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Noto+Serif+SC:wght@400;700&family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="style.css?v=14">
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🌱</text></svg>">
</head>
<body>
<div class="layout">
  <!-- 侧边栏 -->
  <aside class="sidebar" id="sidebar">
    <div class="sidebar-top">
      <div class="avatar">🎸</div>
      <div class="sidebar-info">
        <div class="sidebar-name">永远的神</div>
        <div class="sidebar-sub">四年级 · 10岁</div>
      </div>
      <button class="sidebar-toggle" id="sidebar-toggle" onclick="toggleSidebar()">☰</button>
    </div>
    <div class="nav-section">
      <div class="nav-label">🏠 导航</div>
      <a class="nav-item active" href="/">
        <span class="nav-icon">🏠</span>
        <span class="nav-text">首页</span>
      </a>
      <a class="nav-item" href="/diary">
        <span class="nav-icon">📝</span>
        <span class="nav-text">日记</span>
      </a>
      <div class="nav-label">📚 学习</div>
      <a class="nav-item" href="/chinese">
        <span class="nav-icon">📖</span>
        <span class="nav-text">语文</span>
      </a>
      <a class="nav-item" href="/math">
        <span class="nav-icon">🔢</span>
        <span class="nav-text">数学</span>
      </a>
      <a class="nav-item" href="/english">
        <span class="nav-icon">🔤</span>
        <span class="nav-text">英语</span>
      </a>
      <a class="nav-item" href="/olympiad">
        <span class="nav-icon">🧮</span>
        <span class="nav-text">奥数</span>
      </a>
      <div class="nav-label">🎯 兴趣</div>
      <a class="nav-item" href="/guitar">
        <span class="nav-icon">🎸</span>
        <span class="nav-text">吉他</span>
      </a>
      <a class="nav-item" href="/shine">
        <span class="nav-icon">✨</span>
        <span class="nav-text">闪光时刻</span>
      </a>
      <a class="nav-item" href="/tech">
        <span class="nav-icon">🔬</span>
        <span class="nav-text">科技探索</span>
      </a>
    </div>
  </aside>

  <!-- 主内容 -->
  <main class="main" id="main-content"></main>
</div>

<!-- 日记弹窗 -->
<div class="modal" id="modal-diary">
  <div class="modal-overlay" onclick="closeModal('modal-diary')"></div>
  <div class="modal-content">
    <div class="modal-header">
      <h3 class="modal-title">✍️ 写日记</h3>
      <button class="modal-close" onclick="closeModal('modal-diary')">✕</button>
    </div>
    <div class="modal-body">
      <input type="text" class="input" id="diary-title" placeholder="标题">
      <div class="mood-picker" id="diary-mood">
        <div class="mood-item selected" data-mood="😄" onclick="selectMood('😄')">😄</div>
        <div class="mood-item" data-mood="🤩" onclick="selectMood('🤩')">🤩</div>
        <div class="mood-item" data-mood="😊" onclick="selectMood('😊')">😊</div>
        <div class="mood-item" data-mood="🙂" onclick="selectMood('🙂')">🙂</div>
        <div class="mood-item" data-mood="😐" onclick="selectMood('😐')">😐</div>
        <div class="mood-item" data-mood="😔" onclick="selectMood('😔')">😔</div>
        <div class="mood-item" data-mood="😤" onclick="selectMood('😤')">😤</div>
        <div class="mood-item" data-mood="😢" onclick="selectMood('😢')">😢</div>
      </div>
      <textarea class="textarea" id="diary-content" placeholder="今天发生了什么有趣的事？"></textarea>
    </div>
    <div class="form-actions">
      <button class="btn" onclick="closeModal('modal-diary')">取消</button>
      <button class="btn btn-primary" onclick="saveDiary()">保存</button>
    </div>
  </div>
</div>

<!-- 闪光时刻弹窗 -->
<div class="modal" id="modal-shine">
  <div class="modal-overlay" onclick="closeModal('modal-shine')"></div>
  <div class="modal-content">
    <div class="modal-header">
      <h3 class="modal-title">✨ 记录闪光时刻</h3>
      <button class="modal-close" onclick="closeModal('modal-shine')">✕</button>
    </div>
    <div class="modal-body">
      <input type="text" class="input" id="shine-title" placeholder="标题">
      <select class="input" id="shine-type">
        <option value="获奖">🏆 获奖荣誉</option>
        <option value="创作">🎨 创意作品</option>
        <option value="表演">🎭 才艺展示</option>
        <option value="发现">🔍 新发现</option>
        <option value="进步">📈 进步突破</option>
        <option value="其他">💫 其他精彩</option>
      </select>
      <textarea class="textarea" id="shine-desc" placeholder="描述一下这个闪光时刻..."></textarea>
    </div>
    <div class="form-actions">
      <button class="btn" onclick="closeModal('modal-shine')">取消</button>
      <button class="btn btn-primary" onclick="saveShine()">保存</button>
    </div>
  </div>
</div>

<script src="app.js?v=22"></script>
</body>
</html>
