    <a class="nav-item" href="index.html">

    <div class="nav-label">学习</div>

  <div class="nav-section" style="margin-top:auto;padding-top:20px;border-top:1px solid var(--border)">

    </a>
  </div>
</aside>

  
  <main class="main">
    <div class="page-header">
      <h2 class="page-title">📝 成长日记</h2>
      <p class="page-subtitle">记录每一天的收获与感悟</p>
      <button class="btn btn-primary" onclick="openModal('modal-diary')">✍️ 写日记</button>
    </div>
    <div id="diary-list"></div>
  </main>
</div>

<!-- 日记弹窗 -->
<div class="modal" id="modal-diary">
  <div class="modal-overlay" onclick="closeModal('modal-diary')"></div>
  <div class="modal-content">
    <div class="modal-header">
      <h3 class="modal-title">✍️ 写日记</h3>
      <button class="modal-close" onclick="closeModal('modal-diary')">✕</button>
    </div>
    <div class="modal-body">
      <input type="text" class="input" id="diary-title" placeholder="标题">
      <div class="mood-picker" id="diary-mood">
        <div class="mood-item selected" data-mood="😄" onclick="selectMood('😄')">😄</div>
        <div class="mood-item" data-mood="🤩" onclick="selectMood('🤩')">🤩</div>
        <div class="mood-item" data-mood="😊" onclick="selectMood('😊')">😊</div>
        <div class="mood-item" data-mood="🙂" onclick="selectMood('🙂')">🙂</div>
        <div class="mood-item" data-mood="😐" onclick="selectMood('😐')">😐</div>
        <div class="mood-item" data-mood="😔" onclick="selectMood('😔')">😔</div>
        <div class="mood-item" data-mood="😤" onclick="selectMood('😤')">😤</div>
        <div class="mood-item" data-mood="😢" onclick="selectMood('😢')">😢</div>
      </div>
      <textarea class="textarea" id="diary-content" placeholder="今天发生了什么有趣的事？"></textarea>
    </div>
    <div class="modal-footer">
      <button class="btn" onclick="closeModal('modal-diary')">取消</button>
      <button class="btn btn-primary" onclick="saveDiary()">保存</button>
    </div>
  </div>
</div>

<script src="app.js?v=2"></script>
<script>
  // 高亮当前导航
  document.querySelectorAll('.nav-item').forEach(n => {
    if (n.getAttribute('href') === 'diary.html') n.classList.add('active');
  });
  // 初始化页面
  console.log('🔄 正在加载日记...');
  renderDiary().then(() => {
    console.log('✅ 日记加载完成');
  }).catch(err => {
    console.error('❌ 日记加载失败:', err);
  });
</script>
</body>
