<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>尚融的星球</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  
  :root {
    --bg: #0d1117;
    --surface: #161b22;
    --surface2: #21262d;
    --border: #30363d;
    --accent: #3fb950;
    --accent2: #58a6ff;
    --text: #e6edf3;
    --text2: #8b949e;
    --pink: #ff79c6;
    --yellow: #f1fa8c;
    --purple: #bd93f9;
    --orange: #ffa657;
  }
  
  body {
    font-family: -apple-system, BlinkMacSystemFont, 'PingFang SC', 'Microsoft YaHei', sans-serif;
    background: var(--bg);
    color: var(--text);
    height: 100vh;
    display: flex;
    overflow: hidden;
  }
  
  /* === 侧边栏 === */
  .sidebar {
    width: 210px;
    min-width: 210px;
    background: var(--surface);
    border-right: 1px solid var(--border);
    display: flex;
    flex-direction: column;
    padding: 0;
    overflow-y: auto;
  }
  
  .sidebar-top {
    padding: 20px;
    border-bottom: 1px solid var(--border);
  }
  
  .avatar {
    width: 56px;
    height: 56px;
    border-radius: 50%;
    background: linear-gradient(135deg, var(--accent), var(--purple));
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 28px;
    margin-bottom: 10px;
  }
  
  .sidebar-top h1 {
    font-size: 16px;
    font-weight: 700;
    color: var(--text);
    margin-bottom: 2px;
  }
  
  .sidebar-top p {
    font-size: 12px;
    color: var(--text2);
  }
  
  .nav-section {
    padding: 12px 0;
  }
  
  .nav-section-label {
    font-size: 10px;
    color: var(--text2);
    text-transform: uppercase;
    letter-spacing: 1px;
    padding: 4px 20px;
    margin-bottom: 4px;
  }
  
  .nav-item {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 11px 20px;
    cursor: pointer;
    font-size: 14px;
    color: var(--text2);
    transition: all 0.15s;
    border-left: 3px solid transparent;
  }
  
  .nav-item:hover { background: var(--surface2); color: var(--text); }
  .nav-item.active { background: rgba(63,185,80,0.1); color: var(--accent); border-left-color: var(--accent); }
  .nav-item .icon { font-size: 16px; }
  
  /* === 主内容 === */
  .main {
    flex: 1;
    overflow-y: auto;
    padding: 32px 40px;
  }
  
  .page { display: none; }
  .page.active { display: block; }
  
  .page-header {
    margin-bottom: 28px;
  }
  
  .page-header h2 {
    font-size: 22px;
    font-weight: 700;
    margin-bottom: 6px;
  }
  
  .page-header p {
    font-size: 13px;
    color: var(--text2);
  }
  
  /* === 按钮 === */
  .btn {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    padding: 8px 16px;
    border-radius: 8px;
    border: 1px solid var(--border);
    background: var(--surface2);
    color: var(--text);
    font-size: 13px;
    cursor: pointer;
    font-family: inherit;
    transition: all 0.15s;
  }
  
  .btn:hover { border-color: var(--accent); color: var(--accent); }
  .btn-primary { background: var(--accent); border-color: var(--accent); color: #000; font-weight: 600; }
  .btn-primary:hover { background: #4ade60; border-color: #4ade60; }
  .btn-danger { border-color: #f85149; color: #f85149; }
  .btn-danger:hover { background: rgba(248,81,73,0.1); }
  
  .btn-group { display: flex; gap: 8px; margin-bottom: 24px; flex-wrap: wrap; }
  
  /* === 学习板块 - 简洁单元展示 === */
  .learn-section { margin-bottom: 40px; }
  
  .learn-section h3 {
    font-size: 16px;
    font-weight: 600;
    margin-bottom: 14px;
    display: flex;
    align-items: center;
    gap: 8px;
    color: var(--text);
  }
  
  .subject-tabs {
    display: flex;
    gap: 8px;
    margin-bottom: 20px;
    flex-wrap: wrap;
  }
  
  .subject-tab {
    padding: 7px 16px;
    border-radius: 20px;
    font-size: 13px;
    cursor: pointer;
    border: 1px solid var(--border);
    background: var(--surface);
    color: var(--text2);
    transition: all 0.15s;
  }
  
  .subject-tab:hover { border-color: var(--accent); color: var(--accent); }
  .subject-tab.active { background: var(--accent); border-color: var(--accent); color: #000; font-weight: 600; }
  
  .unit-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
    gap: 12px;
  }
  
  .unit-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 14px;
    cursor: pointer;
    transition: all 0.15s;
  }
  
  .unit-card:hover { border-color: var(--accent); }
  .unit-card.done { border-color: var(--accent); background: rgba(63,185,80,0.05); }
  
  .unit-card-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 8px;
  }
  
  .unit-card-title {
    font-size: 13px;
    font-weight: 600;
  }
  
  .unit-card.done .unit-card-title::after {
    content: ' ✓';
    color: var(--accent);
  }
  
  .unit-card-meta {
    font-size: 11px;
    color: var(--text2);
  }
  
  .unit-card-tags { display: flex; gap: 4px; flex-wrap: wrap; }
  
  .tag {
    font-size: 11px;
    padding: 2px 8px;
    border-radius: 12px;
    background: var(--surface2);
    color: var(--text2);
  }
  
  .tag.done { background: rgba(63,185,80,0.15); color: var(--accent); }
  
  /* === 单元详情弹窗 === */
  .unit-detail-content h4 {
    font-size: 16px;
    margin-bottom: 12px;
    color: var(--accent);
  }
  
  .unit-detail-content ul {
    list-style: none;
    display: flex;
    flex-direction: column;
    gap: 8px;
  }
  
  .unit-detail-content li {
    font-size: 13px;
    color: var(--text2);
    padding: 8px 12px;
    background: var(--bg);
    border-radius: 6px;
    border-left: 3px solid var(--border);
  }
  
  .unit-detail-content li.done {
    border-left-color: var(--accent);
    color: var(--text);
  }
  
  /* === 科技新闻 === */
  .news-list { display: flex; flex-direction: column; gap: 12px; }
  
  .news-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 18px 20px;
    cursor: pointer;
    transition: all 0.15s;
    display: flex;
    gap: 16px;
    align-items: flex-start;
  }
  
  .news-card:hover { border-color: var(--accent2); }
  
  .news-icon {
    font-size: 28px;
    flex-shrink: 0;
    margin-top: 2px;
  }
  
  .news-body { flex: 1; }
  
  .news-title {
    font-size: 14px;
    font-weight: 600;
    margin-bottom: 6px;
    line-height: 1.4;
  }
  
  .news-summary {
    font-size: 12px;
    color: var(--text2);
    line-height: 1.6;
    margin-bottom: 8px;
  }
  
  .news-meta {
    display: flex;
    gap: 12px;
    font-size: 11px;
    color: var(--text2);
  }
  
  .news-tag {
    padding: 2px 8px;
    border-radius: 10px;
    font-size: 11px;
  }
  
  .news-tag.ai { background: rgba(189,147,249,0.15); color: var(--purple); }
  .news-tag.space { background: rgba(88,166,255,0.15); color: var(--accent2); }
  .news-tag.tech { background: rgba(255,166,87,0.15); color: var(--orange); }
  .news-tag.robot { background: rgba(255,121,198,0.15); color: var(--pink); }
  .news-tag.game { background: rgba(241,250,140,0.15); color: var(--yellow); }
  
  /* === 日常板块 === */
  .gallery-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
    gap: 16px;
  }
  
  .gallery-item {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 12px;
    overflow: hidden;
    transition: all 0.15s;
    cursor: pointer;
  }
  
  .gallery-item:hover { border-color: var(--accent); transform: translateY(-2px); }
  
  .gallery-img {
    width: 100%;
    height: 180px;
    background: var(--surface2);
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 48px;
  }
  
  .gallery-body { padding: 12px 14px; }
  .gallery-title { font-size: 13px; font-weight: 600; margin-bottom: 4px; }
  .gallery-desc { font-size: 12px; color: var(--text2); line-height: 1.4; }
  .gallery-date { font-size: 11px; color: var(--text2); margin-top: 6px; }
  
  /* 分类筛选 */
  .filter-pills { display: flex; gap: 8px; flex-wrap: wrap; margin-bottom: 20px; }
  
  .filter-pill {
    padding: 5px 14px;
    border-radius: 20px;
    font-size: 12px;
    cursor: pointer;
    border: 1px solid var(--border);
    background: var(--surface);
    color: var(--text2);
    transition: all 0.15s;
  }
  
  .filter-pill:hover, .filter-pill.active { background: var(--accent); border-color: var(--accent); color: #000; font-weight: 600; }
  
  /* === 模态框 === */
  .modal-overlay {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.7);
    z-index: 1000;
    align-items: center;
    justify-content: center;
    padding: 20px;
  }
  
  .modal-overlay.active { display: flex; }
  
  .modal {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 16px;
    width: 100%;
    max-width: 520px;
    max-height: 85vh;
    overflow-y: auto;
    padding: 28px;
    position: relative;
  }
  
  .modal h3 {
    font-size: 18px;
    margin-bottom: 20px;
    font-weight: 700;
  }
  
  .modal-close {
    position: absolute;
    top: 16px;
    right: 16px;
    background: none;
    border: none;
    color: var(--text2);
    font-size: 22px;
    cursor: pointer;
    width: 32px;
    height: 32px;
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: all 0.15s;
  }
  
  .modal-close:hover { background: var(--surface2); color: var(--text); }
  
  /* === 表单 === */
  .form-group { margin-bottom: 16px; }
  
  .form-group label {
    display: block;
    font-size: 12px;
    color: var(--text2);
    margin-bottom: 6px;
    font-weight: 500;
  }
  
  .form-group input,
  .form-group textarea,
  .form-group select {
    width: 100%;
    padding: 10px 12px;
    border-radius: 8px;
    border: 1px solid var(--border);
    background: var(--bg);
    color: var(--text);
    font-size: 14px;
    font-family: inherit;
  }
  
  .form-group input:focus,
  .form-group textarea:focus,
  .form-group select:focus {
    outline: none;
    border-color: var(--accent);
  }
  
  .form-group textarea { min-height: 90px; resize: vertical; }
  
  .form-actions { display: flex; gap: 10px; justify-content: flex-end; margin-top: 20px; }
  
  /* === 空状态 === */
  .empty-state { text-align: center; padding: 60px 20px; color: var(--text2); }
  .empty-state .emoji { font-size: 48px; margin-bottom: 16px; }
  .empty-state p { font-size: 14px; }
  
  /* === 响应式 === */
  @media (max-width: 640px) {
    body { flex-direction: column; }
    .sidebar { width: 100%; min-width: unset; flex-direction: row; padding: 0; border-right: none; border-bottom: 1px solid var(--border); overflow-x: auto; flex-shrink: 0; }
    .sidebar-top { display: none; }
    .nav-section { display: flex; flex-direction: row; padding: 0; }
    .nav-section-label { display: none; }
    .nav-item { padding: 12px 14px; white-space: nowrap; font-size: 13px; }
    .main { padding: 20px 16px; }
    .unit-grid { grid-template-columns: 1fr 1fr; }
    .gallery-grid { grid-template-columns: 1fr; }
  }
</style>
</head>
<body>

<!-- ========== 侧边栏 ========== -->
<aside class="sidebar">
  <div class="sidebar-top">
    <div class="avatar">🎸</div>
    <h1>吴尚融</h1>
    <p>四年级 · 10岁</p>
  </div>
  
  <div class="nav-section">
    <div class="nav-section-label">学习</div>
    <div class="nav-item active" data-page="learn">
      <span class="icon">📚</span> 学习
    </div>
    <div class="nav-section-label">日常</div>
    <div class="nav-item" data-page="daily">
      <span class="icon">🌟</span> 日常帅一面
    </div>
    <div class="nav-item" data-page="tech">
      <span class="icon">🔭</span> 科技新闻
    </div>
  </div>
</aside>

<!-- ========== 主内容 ========== -->
<main class="main">
  
  <!-- === 学习板块 === -->
  <div class="page active" id="page-learn">
    <div class="page-header">
      <h2>📚 学习</h2>
      <p>语数英奥，稳步前进</p>
    </div>
    
    <!-- 语文 -->
    <div class="learn-section">
      <h3>📖 语文</h3>
      <div class="unit-grid" id="chinese-grid"></div>
    </div>
    
    <!-- 英语 -->
    <div class="learn-section">
      <h3>🔤 英语</h3>
      <div class="unit-grid" id="english-grid"></div>
    </div>
    
    <!-- 数学 -->
    <div class="learn-section">
      <h3>🔢 数学</h3>
      <div class="unit-grid" id="math-grid"></div>
    </div>
    
    <!-- 奥数 -->
    <div class="learn-section">
      <h3>🧩 奥数</h3>
      <div class="unit-grid" id="olympiad-grid"></div>
    </div>
  </div>
  
  <!-- === 日常帅一面 === -->
  <div class="page" id="page-daily">
    <div class="page-header">
      <h2>🌟 日常帅一面</h2>
      <p>照片、吉他、才艺……属于尚融的精彩时刻</p>
    </div>
    <div class="btn-group">
      <button class="btn btn-primary" onclick="openAddDaily()">➕ 添加内容</button>
    </div>
    <div class="filter-pills" id="filter-pills"></div>
    <div class="gallery-grid" id="gallery-grid"></div>
  </div>
  
  <!-- === 科技新闻 === -->
  <div class="page" id="page-tech">
    <div class="page-header">
      <h2>🔭 科技新闻</h2>
      <p>AI、航天、机器人……科技最前沿</p>
    </div>
    <div class="btn-group">
      <button class="btn btn-primary" onclick="openAddNews()">➕ 添加新闻</button>
    </div>
    <div class="news-list" id="news-list"></div>
  </div>
  
</main>

<!-- ========== 模态框 ========== -->

<!-- 添加日常 -->
<div class="modal-overlay" id="modal-daily">
  <div class="modal">
    <button class="modal-close" onclick="closeModal('modal-daily')">×</button>
    <h3>➕ 添加日常内容</h3>
    <div class="form-group">
      <label>标题</label>
      <input id="daily-title" placeholder="比如：学校运动会">
    </div>
    <div class="form-group">
      <label>类型</label>
      <select id="daily-type">
        <option value="📸 照片">📸 照片</option>
        <option value="🎸 吉他">🎸 吉他</option>
        <option value="⚽ 运动">⚽ 运动</option>
        <option value="🎨 绘画">🎨 绘画</option>
        <option value="🎮 游戏">🎮 游戏</option>
        <option value="🎬 视频">🎬 视频</option>
        <option value="🏆 荣誉">🏆 荣誉</option>
        <option value="✨ 其他">✨ 其他</option>
      </select>
    </div>
    <div class="form-group">
      <label>描述</label>
      <textarea id="daily-desc" placeholder="简单描述一下这个时刻..."></textarea>
    </div>
    <div class="form-actions">
      <button class="btn" onclick="closeModal('modal-daily')">取消</button>
      <button class="btn btn-primary" onclick="saveDaily()">保存</button>
    </div>
  </div>
</div>

<!-- 添加新闻 -->
<div class="modal-overlay" id="modal-news">
  <div class="modal">
    <button class="modal-close" onclick="closeModal('modal-news')">×</button>
    <h3>➕ 添加科技新闻</h3>
    <div class="form-group">
      <label>新闻标题</label>
      <input id="news-title" placeholder="比如：SpaceX 星舰成功着陆">
    </div>
    <div class="form-group">
      <label>类型</label>
      <select id="news-type">
        <option value="ai">🤖 AI人工智能</option>
        <option value="space">🚀 航天航空</option>
        <option value="robot">🤖 机器人</option>
        <option value="tech">💡 科技前沿</option>
        <option value="game">🎮 游戏技术</option>
      </select>
    </div>
    <div class="form-group">
      <label>摘要（选填）</label>
      <textarea id="news-summary" placeholder="简单描述这条新闻的内容..."></textarea>
    </div>
    <div class="form-actions">
      <button class="btn" onclick="closeModal('modal-news')">取消</button>
      <button class="btn btn-primary" onclick="saveNews()">保存</button>
    </div>
  </div>
</div>

<!-- 详情弹窗 -->
<div class="modal-overlay" id="modal-detail">
  <div class="modal">
    <button class="modal-close" onclick="closeModal('modal-detail')">×</button>
    <div id="detail-body"></div>
  </div>
</div>

<script>

function saveStore() {
  localStorage.setItem(STORAGE_KEY, JSON.stringify(store));
}

function isDone(key) {
  return store.doneUnits.includes(key);
}

function toggleDone(key) {
  if (isDone(key)) {
    store.doneUnits = store.doneUnits.filter(k => k !== key);
  } else {
    store.doneUnits.push(key);
  }
  saveStore();
  renderAll();
}

function renderAll() {
  Object.values(SUBJECTS).forEach(sub => renderUnits(sub));
  renderDaily();
  renderNews();
}

function renderUnits(sub) {
  const grid = document.getElementById(sub.title);
  grid.innerHTML = sub.data.map((u, i) => {
    const key = sub.title + '_' + i;
    const done = isDone(key);
    return `<div class="unit-card ${done ? 'done' : ''}" onclick="toggleDone('${key}')">
      <div class="unit-card-header">
        <span class="unit-card-title">${u.name}</span>
      </div>
      <div class="unit-card-meta">${u.sub.substring(0, 20)}...</div>
    </div>`;
  }).join('');
}

// ===== 渲染日常 =====
const DAILY_TYPES = ['全部', '📸 照片', '🎸 吉他', '⚽ 运动', '🎨 绘画', '🎮 游戏', '🎬 视频', '🏆 荣誉', '✨ 其他'];

function renderDailyFilters() {
  const pills = document.getElementById('filter-pills');
  pills.innerHTML = DAILY_TYPES.map(t => {
    const active = t === currentFilter ? 'active' : '';
    return `<span class="filter-pill ${active}" onclick="setFilter('${t}')">${t}</span>`;
  }).join('');
}

function setFilter(t) {
  currentFilter = t;
  renderDailyFilters();
  renderDaily();
}

function renderDaily() {
  const grid = document.getElementById('gallery-grid');
  let items = store.daily;
  if (currentFilter !== '全部') {
    items = items.filter(d => d.type === currentFilter);
  }
  if (items.length === 0) {
    grid.innerHTML = '<div class="empty-state"><div class="emoji">🌟</div><p>还没有内容<br>点击上方「添加内容」开始记录吧</p></div>';
    return;
  }
  grid.innerHTML = items.map(d => `
    <div class="gallery-item" onclick="showDailyDetail(${d.id})">
      <div class="gallery-img">${d.icon}</div>
      <div class="gallery-body">
        <div class="gallery-title">${d.title}</div>
        <div class="gallery-desc">${d.desc}</div>
        <div class="gallery-date">📅 ${d.date} · ${d.type}</div>
      </div>
    </div>
  `).join('');
}

function showDailyDetail(id) {
  const d = store.daily.find(x => x.id === id);
  if (!d) return;
  document.getElementById('detail-body').innerHTML = `
    <div style="font-size:64px;margin-bottom:16px;text-align:center;">${d.icon}</div>
    <h2 style="font-size:20px;margin-bottom:8px;">${d.title}</h2>
    <p style="font-size:12px;color:var(--text2);margin-bottom:16px;">📅 ${d.date} · ${d.type}</p>
    <p style="font-size:14px;color:var(--text2);line-height:1.7;">${d.desc}</p>
    <div style="margin-top:20px;display:flex;justify-content:flex-end;">
      <button class="btn btn-danger" onclick="deleteDaily(${id})">🗑️ 删除</button>
    </div>
  `;
  openModal('modal-detail');
}

function deleteDaily(id) {
  if (!confirm('确定删除？')) return;
  store.daily = store.daily.filter(d => d.id !== id);
  saveStore(); renderDaily(); closeModal('modal-detail');
}

// ===== 渲染新闻 =====
const NEWS_TAG_MAP = { ai: ['🤖 AI', 'ai'], space: ['🚀 航天', 'space'], robot: ['🤖 机器人', 'robot'], tech: ['💡 科技', 'tech'], game: ['🎮 游戏', 'game'] };

function renderNews() {
  const list = document.getElementById('news-list');
  if (store.news.length === 0) {
    list.innerHTML = '<div class="empty-state"><div class="emoji">🔭</div><p>还没有新闻<br>点击上方「添加新闻」开始添加吧</p></div>';
    return;
  }
  const sorted = [...store.news].sort((a, b) => b.id - a.id);
  list.innerHTML = sorted.map(n => {
    const [tagLabel, tagClass] = NEWS_TAG_MAP[n.type] || ['💡 科技', 'tech'];
    return `<div class="news-card" onclick="showNewsDetail(${n.id})">
      <div class="news-icon">${n.icon}</div>
      <div class="news-body">
        <div class="news-title">${n.title}</div>
        ${n.summary ? `<div class="news-summary">${n.summary}</div>` : ''}
        <div class="news-meta">
          <span class="news-tag ${tagClass}">${tagLabel}</span>
          <span>📅 ${n.date}</span>
        </div>
      </div>
    </div>`;
  }).join('');
}

function showNewsDetail(id) {
  const n = store.news.find(x => x.id === id);
  if (!n) return;
  const [tagLabel, tagClass] = NEWS_TAG_MAP[n.type] || ['💡 科技', 'tech'];
  document.getElementById('detail-body').innerHTML = `
    <div style="font-size:56px;margin-bottom:16px;">${n.icon}</div>
    <h2 style="font-size:18px;margin-bottom:12px;line-height:1.4;">${n.title}</h2>
    <div style="margin-bottom:16px;">
      <span class="news-tag ${tagClass}">${tagLabel}</span>
      <span style="font-size:12px;color:var(--text2);margin-left:10px;">📅 ${n.date}</span>
    </div>
    ${n.summary ? `<p style="font-size:14px;color:var(--text2);line-height:1.8;">${n.summary}</p>` : ''}
    <div style="margin-top:20px;display:flex;justify-content:flex-end;gap:10px;">
      <button class="btn btn-danger" onclick="deleteNews(${id})">🗑️ 删除</button>
      <button class="btn" onclick="closeModal('modal-detail')">关闭</button>
    </div>
  `;
  openModal('modal-detail');
}

function deleteNews(id) {
  if (!confirm('确定删除？')) return;
  store.news = store.news.filter(n => n.id !== id);
  saveStore(); renderNews(); closeModal('modal-detail');
}

// ===== 添加操作 =====
function openAddDaily() {
  document.getElementById('daily-title').value = '';
  document.getElementById('daily-type').value = '📸 照片';
  document.getElementById('daily-desc').value = '';
  openModal('modal-daily');
}

function saveDaily() {
  const title = document.getElementById('daily-title').value.trim();
  const type = document.getElementById('daily-type').value;
  const desc = document.getElementById('daily-desc').value.trim();
  if (!title) { alert('请输入标题'); return; }
  const now = new Date();
  const date = `${now.getFullYear()}-${String(now.getMonth()+1).padStart(2,'0')}-${String(now.getDate()).padStart(2,'0')}`;
  const icon = type.split(' ')[0];
  store.daily.unshift({ id: Date.now(), title, type, icon, desc, date });
  saveStore(); renderDaily(); closeModal('modal-daily');
}

function openAddNews() {
  document.getElementById('news-title').value = '';
  document.getElementById('news-type').value = 'ai';
  document.getElementById('news-summary').value = '';
  openModal('modal-news');
}

const NEWS_ICONS = { ai: '🤖', space: '🚀', robot: '🤖', tech: '💡', game: '🎮' };

function saveNews() {
  const title = document.getElementById('news-title').value.trim();
  const type = document.getElementById('news-type').value;
  const summary = document.getElementById('news-summary').value.trim();
  if (!title) { alert('请输入标题'); return; }
  const now = new Date();
  const date = `${now.getFullYear()}-${String(now.getMonth()+1).padStart(2,'0')}-${String(now.getDate()).padStart(2,'0')}`;
  store.news.unshift({ id: Date.now(), title, type, icon: NEWS_ICONS[type] || '💡', summary, date });
  saveStore(); renderNews(); closeModal('modal-news');
}

// ===== 模态框 =====
function openModal(id) { document.getElementById(id).classList.add('active'); }
function closeModal(id) { document.getElementById(id).classList.remove('active'); }
document.querySelectorAll('.modal-overlay').forEach(ov => {
  ov.addEventListener('click', e => { if (e.target === ov) ov.classList.remove('active'); });
});
document.addEventListener('keydown', e => { if (e.key === 'Escape') document.querySelectorAll('.modal-overlay.active').forEach(m => m.classList.remove('active')); });

// ===== 初始化 =====
loadStore();
renderDailyFilters();
renderAll();
